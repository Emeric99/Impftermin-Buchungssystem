services:

  mariadb:
    image: mariadb:11
    container_name: impftermin-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: impftermin
      MYSQL_USER: impfuser
      MYSQL_PASSWORD: impfpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: impftermin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: impftermin-mail
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web-UI

  build:
    image: maven:3.9-eclipse-temurin-17
    container_name: impftermin-build
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: mvn clean package -q
    profiles:
      - build

  tomcat:
    image: tomcat:10-jdk17
    container_name: impftermin-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./target/impftermin.war:/usr/local/tomcat/webapps/impftermin.war
      - ./docker/context.xml:/usr/local/tomcat/conf/context.xml
    environment:
      - CATALINA_OPTS=-Xms256m -Xmx512m
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=impftermin@bremerhaven.de

volumes:
  db_data:
  maven_cache:
