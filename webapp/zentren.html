<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termin buchen – Impftermin-Buchungssystem</title>
    <link rel="stylesheet" href="script.css">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="willkommen.html">
        <span>💉</span> Impfzentrum Bremerhaven
    </a>
    <div class="navbar-links">
        <a href="willkommen.html" class="nav-btn active">Termin buchen</a>
        <a href="termine.html" class="nav-btn">Meine Termine</a>
        <a href="logout" class="nav-btn logout">Abmelden</a>
    </div>
</nav>

<div class="layout">
    <aside class="sidebar">
        <a href="willkommen.html" class="sidebar-item active">
            <span class="icon">📅</span> Termin buchen
        </a>
        <a href="termine.html" class="sidebar-item">
            <span class="icon">📋</span> Meine Termine
        </a>
    </aside>

    <main class="main">
        <h1 class="page-title" id="center-title">Termin buchen</h1>
        <p class="page-subtitle" id="center-subtitle">Wählen Sie Datum, Uhrzeit und Impfstoff.</p>

        <div class="card">
            <div class="card-title" id="center-info">Impfzentrum</div>

            <form action="buchung" method="post">
                <input type="hidden" name="center" id="center">

                <div class="form-grid">
                    <div class="field">
                        <label for="date">Datum</label>
                        <input type="date" id="date" name="date1" required>
                    </div>
                    <div class="field">
                        <label for="heure1">Uhrzeit</label>
                        <select name="heure1" id="heure1" required>
                            <option value="">Uhrzeit wählen</option>
                            <option value="08:00">08:00</option>
                            <option value="08:30">08:30</option>
                            <option value="09:00">09:00</option>
                            <option value="09:30">09:30</option>
                            <option value="10:00">10:00</option>
                            <option value="10:30">10:30</option>
                            <option value="11:00">11:00</option>
                            <option value="11:30">11:30</option>
                            <option value="12:00">12:00</option>
                            <option value="12:30">12:30</option>
                            <option value="13:00">13:00</option>
                            <option value="13:30">13:30</option>
                            <option value="14:00">14:00</option>
                            <option value="14:30">14:30</option>
                            <option value="15:00">15:00</option>
                            <option value="15:30">15:30</option>
                            <option value="16:00">16:00</option>
                            <option value="16:30">16:30</option>
                            <option value="17:00">17:00</option>
                            <option value="17:30">17:30</option>
                        </select>
                    </div>
                    <div class="field full">
                        <label for="vaccine">Impfstoff</label>
                        <select id="vaccine" name="vaccine" required>
                            <option value="">Impfstoff wählen</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="familien_mitglied">Familienmitglied (optional)</label>
                        <input type="text" id="familien_mitglied" name="familien_mitglied" placeholder="Name des Familienmitglieds">
                    </div>
                    <div class="field">
                        <label for="relation">Beziehung (optional)</label>
                        <input type="text" id="relation" name="relation" placeholder="z.B. Sohn, Tochter">
                    </div>
                </div>

                <div class="form-actions">
                    <a href="willkommen.html" class="btn-secondary">Zurück</a>
                    <button type="submit" class="btn-primary">✓ Termin buchen</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    const centerData = {
        "Impfzentrum Bremerhaven": {
            adresse: "Hafenstraße 1, 27568 Bremerhaven",
            cabins: 5,
            vaccines: [
                { value: "1", text: "BioNTech/Pfizer" },
                { value: "2", text: "Moderna" },
                { value: "3", text: "Johnson & Johnson" },
                { value: "4", text: "AstraZeneca" }
            ]
        },
        "Impfzentrum Bremen Mitte": {
            adresse: "Domshof 10, 28195 Bremen",
            cabins: 8,
            vaccines: [
                { value: "1", text: "BioNTech/Pfizer" },
                { value: "2", text: "Moderna" },
                { value: "3", text: "Johnson & Johnson" },
                { value: "4", text: "AstraZeneca" }
            ]
        },
        "Impfzentrum Bremen Nord": {
            adresse: "Vegesacker Heerstraße 12, 28757 Bremen",
            cabins: 4,
            vaccines: [
                { value: "1", text: "BioNTech/Pfizer" },
                { value: "2", text: "Moderna" },
                { value: "3", text: "Johnson & Johnson" },
                { value: "4", text: "AstraZeneca" }
            ]
        }
    };

    const center = new URLSearchParams(window.location.search).get('center');

    if (center && centerData[center]) {
        const data = centerData[center];
        document.getElementById('center-title').textContent = center;
        document.getElementById('center-subtitle').textContent = data.adresse;
        document.getElementById('center-info').textContent = center + ' · ' + data.cabins + ' Kabinen';
        document.getElementById('center').value = center;

        const vaccineSelect = document.getElementById('vaccine');
        data.vaccines.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.value;
            opt.textContent = v.text;
            vaccineSelect.appendChild(opt);
        });
    } else {
        document.getElementById('center-title').textContent = 'Zentrum nicht gefunden';
        document.getElementById('center-subtitle').textContent = 'Bitte wählen Sie ein Zentrum über die Startseite.';
    }

    // Mindestdatum = heute
    document.getElementById('date').min = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
