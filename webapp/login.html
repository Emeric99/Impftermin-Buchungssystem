<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Impftermin-Buchungssystem</title>
    <link rel="stylesheet" href="script.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">💉</div>
            <h1>Impftermin-Buchungssystem</h1>
            <p>Stadt Bremerhaven</p>
        </div>

        <form action="login" method="post">
            <div class="field">
                <label for="benutzername">Benutzername</label>
                <input type="text" id="benutzername" name="benutzername" placeholder="Ihr Benutzername" required>
            </div>
            <div class="field">
                <label for="passwort">Passwort</label>
                <input type="password" id="passwort" name="passwort" placeholder="Ihr Passwort" required>
            </div>
            <button type="submit" class="btn-primary">Anmelden</button>
        </form>

        <div class="auth-link">
            Noch kein Konto? <a href="register.html">Jetzt registrieren</a>
        </div>
    </div>
</div>
</body>
</html>
